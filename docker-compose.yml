services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: furlong
      POSTGRES_PASSWORD: furlong
      POSTGRES_DB: furlong
    ports:
      # Host 5433 -> container 5432. Avoids clashing with other local
      # Postgres containers (crossbar/vantage) already bound to 5432/5434.
      - "5433:5432"
    volumes:
      - furlong_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      # Host 6380 -> container 6379. Avoids clashing with 6379/6381 in use.
      - "6380:6379"
    volumes:
      - furlong_redis:/data
volumes:
  furlong_pg:
  furlong_redis:
