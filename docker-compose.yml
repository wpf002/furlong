services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: furlong
      POSTGRES_PASSWORD: furlong
      POSTGRES_DB: furlong
    ports:
      # Host 5460 -> container 5432. 5432/5433/5434 are taken by other local
      # Postgres containers (crossbar/vantage/knit), so use an unused high port.
      - "5460:5432"
    volumes:
      - furlong_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      # Host 6395 -> container 6379. 6379/6380/6381 are in use locally.
      - "6395:6379"
    volumes:
      - furlong_redis:/data
volumes:
  furlong_pg:
  furlong_redis:
